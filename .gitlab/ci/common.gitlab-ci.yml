# Shared CI templates for rmcp-actix-web

# sccache configuration for build caching
.sccache-rust:
  variables:
    RUSTC_WRAPPER: "sccache"
    SCCACHE_LOG: "warn"
  before_script:
    - echo "RUSTC_WRAPPER=$RUSTC_WRAPPER"
    - sccache --version

# Docker-in-Docker variables (reusable anchor)
.docker-in-docker-variables: &docker-in-docker-variables
  DOCKER_TLS_CERTDIR: "/certs"

# Docker-in-Docker template
.docker-in-docker:
  image: docker:29.5.1-dind@sha256:5d0f434af43d0c804c0d67f663bfc07f762eceecf3df6f774b9f4570a65c2f8b
  services:
    - docker:29.5.1-dind@sha256:5d0f434af43d0c804c0d67f663bfc07f762eceecf3df6f774b9f4570a65c2f8b
  tags:
    - dind
  variables:
    <<: *docker-in-docker-variables
  before_script:
    - docker info
