# Shared CI templates for rmcp-actix-web

# sccache configuration for build caching
.sccache-rust:
  variables:
    RUSTC_WRAPPER: "sccache"
    SCCACHE_LOG: "warn"
  before_script:
    - echo "RUSTC_WRAPPER=$RUSTC_WRAPPER"
    - sccache --version

# Docker-in-Docker variables (reusable anchor)
.docker-in-docker-variables: &docker-in-docker-variables
  DOCKER_TLS_CERTDIR: "/certs"

# Docker-in-Docker template
.docker-in-docker:
  image: docker:29.4.0-dind@sha256:edaa00c1ab17574f96a93508de97c699dee40a9593b69e6bb0c2b8810d73c505
  services:
    - docker:29.4.0-dind@sha256:edaa00c1ab17574f96a93508de97c699dee40a9593b69e6bb0c2b8810d73c505
  tags:
    - dind
  variables:
    <<: *docker-in-docker-variables
  before_script:
    - docker info
